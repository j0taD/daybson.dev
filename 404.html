<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — daybson.dev</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=boska@400,600&f[]=satoshi@400,500&display=swap">
  <link rel="stylesheet" href="./style.css">
  <style>
    body{display:grid;place-items:center;min-height:100svh;padding:var(--s6);}
    .nf{text-align:center;max-width:36rem;display:flex;flex-direction:column;align-items:center;gap:var(--s5);}
    .nf-num{font-family:var(--font-display);font-size:clamp(5rem,20vw,10rem);font-weight:700;line-height:1;color:var(--accent);letter-spacing:-.04em;}
    .nf h1{font-family:var(--font-display);font-size:var(--t-xl);}
    .nf p{color:var(--muted);max-width:34ch;}
  </style>
</head>
<body>
  <div class="nf">
    <div class="nf-num">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço acessado não existe ou foi movido. Clique abaixo para voltar ao portfólio.</p>
    <a class="btn-primary" href="./index.html">← Voltar ao início</a>
  </div>
  <script>
    const d=document.documentElement;
    d.setAttribute('data-theme',matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  </script>
</body>
</html>
