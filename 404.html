<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Não encontrado · daybson.dev</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=boska@400,600&f[]=satoshi@400,500&display=swap">
  <link rel="stylesheet" href="./style.css">
  <style>
    body { display:grid; place-items:center; min-height:100svh; }
    .nf {
      text-align:center; max-width:38rem;
      padding:var(--sp10) var(--sp6);
      display:flex; flex-direction:column; align-items:center; gap:var(--sp5);
    }
    .nf-code {
      font-family: var(--font-display);
      font-size:clamp(5rem,18vw,9rem);
      font-weight:600;
      color:var(--accent);
      line-height:1;
      letter-spacing:-.04em;
    }
    .nf h1 { font-family:var(--font-display); font-size:var(--text-xl); }
    .nf p  { color:var(--muted); max-width:36ch; }
  </style>
</head>
<body>
  <div class="nf">
    <div class="nf-code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço acessado não existe ou foi movido. Volte ao início do portfólio.</p>
    <a class="cta-primary" href="./index.html">Voltar ao início</a>
  </div>
  <script>
    const d = document.documentElement;
    const dark = matchMedia('(prefers-color-scheme:dark)').matches;
    d.setAttribute('data-theme', dark ? 'dark' : 'light');
  </script>
</body>
</html>
